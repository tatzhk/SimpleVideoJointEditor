<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>クリップつなぎ | 動画編集</title>
<style>
  :root{
    --bg:#14161a;
    --panel:#1c1f25;
    --panel-2:#22262e;
    --line:#31363f;
    --text:#e8eaed;
    --text-dim:#8b93a1;
    --accent:#ff6a3d;
    --accent-dim:#7a3823;
    --good:#3ddc84;
    --danger:#ff4d5e;
    --radius:10px;
    --mono: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    --sans: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%; background:var(--bg); color:var(--text); font-family:var(--sans); overscroll-behavior:none;}
  body{display:flex; flex-direction:column;}

  header{
    padding:12px 16px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--line); background:var(--panel);
  }
  header h1{font-size:15px; font-weight:600; margin:0; letter-spacing:.02em;}
  header .sub{font-size:11px; color:var(--text-dim); margin-top:2px;}

  .btn{
    appearance:none; border:1px solid var(--line); background:var(--panel-2); color:var(--text);
    padding:8px 12px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer;
    display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
  }
  .btn:active{transform:scale(.97);}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#1a0d06;}
  .btn.ghost{background:transparent;}
  .btn.danger{color:var(--danger); border-color:#4a2226;}
  .btn:disabled{opacity:.35; pointer-events:none;}
  .btn.sm{padding:6px 10px; font-size:12px;}

  #fileInput{display:none;}

  .toolbar{
    display:flex; gap:8px; padding:10px 12px; overflow-x:auto; border-bottom:1px solid var(--line);
    background:var(--panel);
  }

  .stage{
    flex:1; display:flex; flex-direction:column; min-height:0;
  }

  .preview-wrap{
    background:#000; flex:1; display:flex; align-items:center; justify-content:center; position:relative; min-height:0;
  }
  video#preview{max-width:100%; max-height:100%; width:100%; height:100%; object-fit:contain; background:#000;}
  .empty-state{color:var(--text-dim); font-size:13px; text-align:center; padding:24px; line-height:1.7;}
  .empty-state b{color:var(--text); display:block; font-size:15px; margin-bottom:6px;}

  .playbar{
    display:flex; align-items:center; gap:10px; padding:8px 14px; background:var(--panel); border-top:1px solid var(--line);
  }
  .time{font-family:var(--mono); font-size:12px; color:var(--text-dim); min-width:96px;}
  .playbtn{
    width:36px; height:36px; border-radius:50%; background:var(--accent); border:none; color:#1a0d06;
    display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; font-size:14px;
  }

  .timeline-panel{
    background:var(--panel); border-top:1px solid var(--line); padding:10px 0 14px;
  }
  .timeline-actions{
    display:flex; gap:8px; padding:0 12px 10px; align-items:center; justify-content:space-between;
  }
  .timeline-actions .group{display:flex; gap:8px;}

  .timeline-scroll{
    overflow-x:auto; padding:0 12px 6px; -webkit-overflow-scrolling:touch;
  }
  .ruler{
    height:16px; position:relative; margin-bottom:4px;
  }
  .track-wrap{position:relative;}
  .track{
    position:relative; height:64px; background:var(--panel-2); border-radius:8px; overflow:visible;
  }
  .playhead{
    position:absolute; top:-16px; bottom:0; width:2px; background:var(--accent); z-index:20; pointer-events:none;
  }
  .playhead::before{
    content:""; position:absolute; top:-2px; left:-5px; width:12px; height:12px; background:var(--accent); border-radius:2px;
  }
  .clip{
    position:absolute; top:0; height:64px; border-radius:7px; background:linear-gradient(180deg,#3a4250,#2b323d);
    border:1px solid var(--line); overflow:hidden; touch-action:none;
  }
  .clip.selected{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset;}
  .clip .label{
    position:absolute; left:6px; bottom:4px; font-size:10px; color:#fff; background:rgba(0,0,0,.45);
    padding:1px 5px; border-radius:4px; white-space:nowrap; max-width:calc(100% - 24px); overflow:hidden; text-overflow:ellipsis;
    pointer-events:none;
  }
  .clip .idx{
    position:absolute; left:6px; top:4px; font-size:10px; color:var(--text-dim); font-family:var(--mono);
    pointer-events:none;
  }
  .clip canvas{position:absolute; inset:0; width:100%; height:100%; opacity:.55; object-fit:cover;}
  .handle{
    position:absolute; top:0; bottom:0; width:14px; background:rgba(255,255,255,.06);
    display:flex; align-items:center; justify-content:center; cursor:ew-resize; z-index:5;
  }
  .handle::after{content:""; width:3px; height:22px; border-radius:2px; background:#fff; opacity:.7;}
  .handle.left{left:0; border-radius:7px 0 0 7px;}
  .handle.right{right:0; border-radius:0 7px 7px 0;}

  .drag-move{cursor:grab;}

  footer.status{
    padding:6px 14px; font-size:11px; color:var(--text-dim); border-top:1px solid var(--line); background:var(--panel);
    min-height:16px;
  }

  .modal-bg{
    position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:flex-end; justify-content:center; z-index:100;
  }
  .modal{
    background:var(--panel); width:100%; max-width:520px; border-radius:16px 16px 0 0; padding:18px 18px 28px;
    border:1px solid var(--line); border-bottom:none;
  }
  .modal h2{font-size:15px; margin:0 0 10px;}
  .modal p{font-size:13px; color:var(--text-dim); line-height:1.6; margin:0 0 14px;}
  .modal .row{display:flex; gap:8px; margin-top:14px;}
  progress{width:100%; height:8px; accent-color:var(--accent);}
  textarea.xmlbox{
    width:100%; height:140px; background:#0f1114; color:#8be99b; font-family:var(--mono); font-size:11px;
    border:1px solid var(--line); border-radius:8px; padding:8px; resize:vertical;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>クリップつなぎ</h1>
    <div class="sub">カメラロール直接参照 / ローカル編集</div>
  </div>
  <button class="btn ghost sm" id="helpBtn">?</button>
</header>

<div class="toolbar">
  <button class="btn primary" id="addBtn">＋ 動画を選択</button>
  <button class="btn" id="splitBtn" disabled>✂️ 再生位置で分割</button>
  <button class="btn" id="saveBtn" disabled>💾 編集を保存</button>
  <button class="btn" id="loadBtn">📂 編集を復元</button>
  <button class="btn primary" id="exportBtn" disabled>📤 書き出し</button>
  <input id="fileInput" type="file" accept="video/*" multiple>
</div>

<div class="stage">
  <div class="preview-wrap">
    <video id="preview" playsinline muted></video>
    <div class="empty-state" id="emptyState">
      <b>まだ素材がありません</b>
      「動画を選択」でカメラロールから動画をタップした順に選んでください。<br>
      選んだ順番がそのままタイムラインの並びになります。
    </div>
  </div>

  <div class="playbar">
    <button class="playbtn" id="playBtn">▶</button>
    <div class="time" id="timeLabel">00:00.0 / 00:00.0</div>
  </div>

  <div class="timeline-panel">
    <div class="timeline-actions">
      <div class="group">
        <button class="btn sm danger" id="deleteBtn" disabled>選択クリップを削除</button>
      </div>
      <div class="group">
        <span style="font-size:11px;color:var(--text-dim)" id="clipCount">0 クリップ</span>
      </div>
    </div>
    <div class="timeline-scroll">
      <div class="ruler" id="ruler"></div>
      <div class="track-wrap">
        <div class="track" id="track"></div>
      </div>
    </div>
  </div>
  <footer class="status" id="status">準備完了</footer>
</div>

<script>
/* ================= 状態管理 ================= */
const PX_PER_SEC = 60;
const MIN_CLIP_SEC = 0.3;

let clips = []; // {id, file, name, size, lastModified, url, duration, inP, outP}
let selectedId = null;
let playhead = 0; // グローバルタイムライン上の秒
let isPlaying = false;
let nextId = 1;

const $ = sel => document.querySelector(sel);
const fileInput = $('#fileInput');
const track = $('#track');
const ruler = $('#ruler');
const preview = $('#preview');
const timeLabel = $('#timeLabel');
const emptyState = $('#emptyState');
const statusEl = $('#status');

function setStatus(msg){ statusEl.textContent = msg; }
function fmt(t){
  if(!isFinite(t)) t = 0;
  const m = Math.floor(t/60), s = t - m*60;
  return String(m).padStart(2,'0') + ':' + s.toFixed(1).padStart(4,'0');
}
function totalDuration(){
  return clips.reduce((a,c)=> a + (c.outP - c.inP), 0);
}
function clipStartOnTimeline(clip){
  let t = 0;
  for(const c of clips){
    if(c.id === clip.id) return t;
    t += (c.outP - c.inP);
  }
  return t;
}
function findClipAt(globalT){
  let t = 0;
  for(const c of clips){
    const d = c.outP - c.inP;
    if(globalT < t + d || c === clips[clips.length-1]) return {clip:c, localStart:t};
    t += d;
  }
  return null;
}

/* ================= ファイル読み込み ================= */
$('#addBtn').addEventListener('click', ()=> fileInput.click());
fileInput.addEventListener('change', async (e)=>{
  const files = Array.from(e.target.files || []);
  for(const file of files){
    const url = URL.createObjectURL(file); // メモリ上の一時参照。コピーやキャッシュファイルは作成しない
    const duration = await probeDuration(url);
    clips.push({
      id: nextId++,
      file, url,
      name: file.name,
      size: file.size,
      lastModified: file.lastModified,
      duration,
      inP: 0,
      outP: duration
    });
  }
  fileInput.value = '';
  render();
  setStatus(files.length + ' 個のクリップを追加しました');
});

function probeDuration(url){
  return new Promise(resolve=>{
    const v = document.createElement('video');
    v.preload = 'metadata';
    v.src = url;
    v.onloadedmetadata = ()=> resolve(v.duration || 0);
    v.onerror = ()=> resolve(0);
  });
}

/* ================= タイムライン描画 ================= */
function render(){
  const has = clips.length > 0;
  emptyState.style.display = has ? 'none' : 'block';
  preview.style.display = has ? 'block' : 'none';
  $('#splitBtn').disabled = !has;
  $('#saveBtn').disabled = !has;
  $('#exportBtn').disabled = !has;
  $('#deleteBtn').disabled = !selectedId;
  $('#clipCount').textContent = clips.length + ' クリップ / 合計 ' + fmt(totalDuration());

  const total = totalDuration();
  const widthPx = Math.max(total * PX_PER_SEC, 300);
  track.style.width = widthPx + 'px';
  ruler.style.width = widthPx + 'px';

  track.querySelectorAll('.clip').forEach(el=>el.remove());
  track.querySelectorAll('.playhead').forEach(el=>el.remove());

  let x = 0;
  clips.forEach((c, i)=>{
    const w = Math.max((c.outP - c.inP) * PX_PER_SEC, 24);
    const el = document.createElement('div');
    el.className = 'clip' + (c.id===selectedId ? ' selected' : '');
    el.style.left = x + 'px';
    el.style.width = w + 'px';
    el.dataset.id = c.id;

    const idx = document.createElement('div');
    idx.className = 'idx'; idx.textContent = '#' + (i+1);
    const label = document.createElement('div');
    label.className = 'label'; label.textContent = c.name;
    const hl = document.createElement('div'); hl.className='handle left';
    const hr = document.createElement('div'); hr.className='handle right';

    el.appendChild(idx); el.appendChild(label); el.appendChild(hl); el.appendChild(hr);
    track.appendChild(el);

    attachClipInteractions(el, c, hl, hr);
    x += w;
  });

  const ph = document.createElement('div');
  ph.className = 'playhead';
  ph.style.left = (playhead * PX_PER_SEC) + 'px';
  track.appendChild(ph);

  timeLabel.textContent = fmt(playhead) + ' / ' + fmt(total);
}

/* ================= クリップ操作: 選択・トリム・並べ替え ================= */
function attachClipInteractions(el, clip, hl, hr){
  el.addEventListener('click', (e)=>{
    if(e.target === hl || e.target === hr) return;
    selectedId = clip.id;
    render();
  });

  // トリムハンドル(左)
  let dragState = null;
  hl.addEventListener('pointerdown', e=>{
    e.stopPropagation();
    hl.setPointerCapture(e.pointerId);
    dragState = {type:'in', startX:e.clientX, origIn: clip.inP};
  });
  hr.addEventListener('pointerdown', e=>{
    e.stopPropagation();
    hr.setPointerCapture(e.pointerId);
    dragState = {type:'out', startX:e.clientX, origOut: clip.outP};
  });
  function onMove(e){
    if(!dragState) return;
    const dx = (e.clientX - dragState.startX) / PX_PER_SEC;
    if(dragState.type === 'in'){
      let v = dragState.origIn + dx;
      v = Math.max(0, Math.min(v, clip.outP - MIN_CLIP_SEC));
      clip.inP = v;
    } else {
      let v = dragState.origOut + dx;
      v = Math.min(clip.duration, Math.max(v, clip.inP + MIN_CLIP_SEC));
      clip.outP = v;
    }
    render();
  }
  function onUp(e){
    if(dragState){ dragState = null; setStatus('トリムを調整しました'); }
  }
  hl.addEventListener('pointermove', onMove);
  hr.addEventListener('pointermove', onMove);
  hl.addEventListener('pointerup', onUp);
  hr.addEventListener('pointerup', onUp);

  // 並べ替え(クリップ本体をドラッグして順番を入れ替え)
  let moveState = null;
  el.addEventListener('pointerdown', e=>{
    if(e.target === hl || e.target === hr) return;
    el.setPointerCapture(e.pointerId);
    moveState = {startX:e.clientX, moved:false};
  });
  el.addEventListener('pointermove', e=>{
    if(!moveState) return;
    if(Math.abs(e.clientX - moveState.startX) > 12) moveState.moved = true;
    if(!moveState.moved) return;
    // 現在のポインタ位置直下にあるクリップの前後どちらに置くか判定
    const trackRect = track.getBoundingClientRect();
    const px = e.clientX - trackRect.left + track.scrollLeft;
    const curIdx = clips.findIndex(c=>c.id===clip.id);
    let acc = 0, targetIdx = clips.length - 1;
    for(let i=0;i<clips.length;i++){
      const w = Math.max((clips[i].outP-clips[i].inP)*PX_PER_SEC, 24);
      if(px < acc + w/2){ targetIdx = i; break; }
      acc += w;
    }
    if(targetIdx !== curIdx){
      const [item] = clips.splice(curIdx,1);
      clips.splice(targetIdx,0,item);
      render();
    }
  });
  el.addEventListener('pointerup', e=>{
    if(moveState && moveState.moved) setStatus('クリップの順番を変更しました');
    moveState = null;
  });
}

$('#deleteBtn').addEventListener('click', ()=>{
  if(!selectedId) return;
  clips = clips.filter(c=>c.id !== selectedId);
  selectedId = null;
  render();
  setStatus('クリップを削除しました');
});

/* ================= 分割 ================= */
$('#splitBtn').addEventListener('click', ()=>{
  const hit = findClipAt(playhead);
  if(!hit) return;
  const { clip, localStart } = hit;
  const cutAtSourceTime = clip.inP + (playhead - localStart);
  if(cutAtSourceTime <= clip.inP + MIN_CLIP_SEC || cutAtSourceTime >= clip.outP - MIN_CLIP_SEC){
    setStatus('この位置では分割できません(端に近すぎます)');
    return;
  }
  const idx = clips.findIndex(c=>c.id===clip.id);
  const partB = {
    ...clip,
    id: nextId++,
    inP: cutAtSourceTime,
    outP: clip.outP
  };
  clip.outP = cutAtSourceTime;
  clips.splice(idx+1, 0, partB);
  render();
  setStatus('再生位置でクリップを分割しました');
});

/* ================= 再生 (連結プレビュー) ================= */
$('#playBtn').addEventListener('click', ()=> isPlaying ? pausePlayback() : startPlayback());

function seekTo(globalT){
  playhead = Math.max(0, Math.min(globalT, totalDuration()));
  const hit = findClipAt(playhead);
  if(hit){
    const localT = hit.clip.inP + (playhead - hit.localStart);
    if(preview.src !== hit.clip.url) preview.src = hit.clip.url;
    preview.currentTime = localT;
  }
  render();
}

function startPlayback(){
  if(clips.length===0) return;
  isPlaying = true;
  $('#playBtn').textContent = '⏸';
  playCurrentSegment();
}
function pausePlayback(){
  isPlaying = false;
  $('#playBtn').textContent = '▶';
  preview.pause();
}
function playCurrentSegment(){
  const hit = findClipAt(playhead);
  if(!hit){ pausePlayback(); return; }
  const { clip, localStart } = hit;
  const localT = clip.inP + (playhead - localStart);
  const doPlay = ()=>{ preview.currentTime = localT; preview.play(); };
  if(preview.src !== clip.url){
    preview.src = clip.url;
    preview.onloadedmetadata = doPlay;
  } else {
    doPlay();
  }
}
preview.addEventListener('timeupdate', ()=>{
  if(!isPlaying) return;
  const hit = findClipAt(playhead);
  if(!hit) return;
  const { clip, localStart } = hit;
  const globalT = localStart + (preview.currentTime - clip.inP);
  playhead = globalT;
  timeLabel.textContent = fmt(playhead) + ' / ' + fmt(totalDuration());
  const ph = track.querySelector('.playhead');
  if(ph) ph.style.left = (playhead * PX_PER_SEC) + 'px';

  if(preview.currentTime >= clip.outP - 0.03){
    const idx = clips.findIndex(c=>c.id===clip.id);
    if(idx < clips.length - 1){
      playhead = clipStartOnTimeline(clips[idx+1]);
      playCurrentSegment();
    } else {
      pausePlayback();
      playhead = totalDuration();
      render();
    }
  }
});

// タイムラインをタップ/ドラッグしてシーク
track.addEventListener('pointerdown', e=>{
  if(e.target.classList.contains('handle')) return;
  if(e.target.closest('.clip') && e.target.closest('.clip').dataset.dragging) return;
  const rect = track.getBoundingClientRect();
  const x = e.clientX - rect.left + track.scrollLeft;
  seekTo(x / PX_PER_SEC);
});

/* ================= FCPXML 生成 ================= */
function toFcpxmlTime(sec){
  // FCPXMLは frame-rational time (例 "12345/2500s") を使うが、簡易的に秒ベースの分数表現にする
  const num = Math.round(sec * 600); // 1/600s 単位
  return num + '/600s';
}
function buildFCPXML(){
  const assetsMap = new Map();
  clips.forEach(c=>{
    if(!assetsMap.has(c.name)){
      assetsMap.set(c.name, { id: 'r' + (assetsMap.size+2), name: c.name, duration: c.duration });
    }
  });
  const resources = Array.from(assetsMap.values()).map(a=>
    `    <asset id="${a.id}" name="${escXml(a.name)}" hasVideo="1" hasAudio="1" duration="${toFcpxmlTime(a.duration)}">\n` +
    `      <media-rep kind="original-media" src="file:///CameraRoll/${encodeURIComponent(a.name)}"/>\n` +
    `    </asset>`
  ).join('\n');

  let offset = 0;
  const clipXml = clips.map(c=>{
    const asset = assetsMap.get(c.name);
    const dur = c.outP - c.inP;
    const xml =
      `      <asset-clip ref="${asset.id}" name="${escXml(c.name)}" offset="${toFcpxmlTime(offset)}" ` +
      `start="${toFcpxmlTime(c.inP)}" duration="${toFcpxmlTime(dur)}"/>`;
    offset += dur;
    return xml;
  }).join('\n');

  const total = totalDuration();
  return `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fcpxml>
<fcpxml version="1.9">
  <resources>
${resources}
    <format id="r1" name="FFVideoFormat" frameDuration="100/3000s"/>
  </resources>
  <library>
    <event name="ClipTsunagi Export">
      <project name="Sequence">
        <sequence duration="${toFcpxmlTime(total)}" format="r1" tcStart="0s">
          <spine>
${clipXml}
          </spine>
        </sequence>
      </project>
    </event>
  </library>
</fcpxml>`;
}
function escXml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ================= 保存 / 復元 (localStorage) ================= */
const STORAGE_KEY = 'clip_tsunagi_edit_v1';

$('#saveBtn').addEventListener('click', ()=>{
  const data = {
    savedAt: Date.now(),
    clips: clips.map(c=>({
      name:c.name, size:c.size, lastModified:c.lastModified,
      duration:c.duration, inP:c.inP, outP:c.outP
    })),
    fcpxml: buildFCPXML()
  };
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    setStatus('編集データをブラウザのローカルストレージに保存しました（FCPXML同梱）');
  }catch(err){
    setStatus('保存に失敗しました: ' + err.message);
  }
});

$('#loadBtn').addEventListener('click', ()=>{
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){ setStatus('保存された編集データがありません'); return; }
  const data = JSON.parse(raw);
  showRelinkModal(data);
});

function showRelinkModal(data){
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal">
      <h2>編集データを復元</h2>
      <p>保存済みの編集(${data.clips.length} クリップ / ${new Date(data.savedAt).toLocaleString()})を復元します。
      ブラウザはファイルへの永続参照を保持できないため、元の動画ファイルをもう一度選択してください。
      ファイル名で自動的に照合し、トリム位置・分割・並び順を復元します。</p>
      <input type="file" id="relinkInput" accept="video/*" multiple class="btn" style="width:100%;">
      <div class="row">
        <button class="btn ghost sm" id="showXmlBtn">FCPXMLを表示</button>
        <button class="btn danger sm" id="cancelRelink">キャンセル</button>
      </div>
      <div id="xmlArea" style="display:none;margin-top:10px;">
        <textarea class="xmlbox" readonly>${escXml(data.fcpxml)}</textarea>
      </div>
    </div>`;
  document.body.appendChild(bg);
  bg.querySelector('#cancelRelink').onclick = ()=> bg.remove();
  bg.querySelector('#showXmlBtn').onclick = ()=>{
    const a = bg.querySelector('#xmlArea'); a.style.display = a.style.display==='none' ? 'block':'none';
  };
  bg.querySelector('#relinkInput').addEventListener('change', async (e)=>{
    const files = Array.from(e.target.files || []);
    const byName = new Map(files.map(f=>[f.name, f]));
    const restored = [];
    let missing = 0;
    for(const meta of data.clips){
      const f = byName.get(meta.name);
      if(!f){ missing++; continue; }
      const url = URL.createObjectURL(f);
      restored.push({
        id: nextId++, file:f, url, name:f.name, size:f.size, lastModified:f.lastModified,
        duration: meta.duration, inP: meta.inP, outP: meta.outP
      });
    }
    clips = restored;
    selectedId = null;
    playhead = 0;
    render();
    bg.remove();
    setStatus(missing>0
      ? `${restored.length} クリップを復元 (${missing} 件は見つかりませんでした)`
      : `${restored.length} クリップを復元しました`);
  });
}

/* ================= 書き出し (ffmpeg.wasm / シングルスレッド版) =================
   GitHub Pagesなど、レスポンスヘッダー(COOP/COEP)を設定できないホスティングでは
   SharedArrayBufferが使えないため、マルチスレッド版(core-mt)は動作しない。
   ここではCOOP/COEP不要のシングルスレッド版コア(@ffmpeg/core, 0.12系)をESMで読み込む。 */
let ffmpegInstance = null;
async function loadFFmpeg(onLog){
  if(ffmpegInstance) return ffmpegInstance;
  const { FFmpeg } = await import('https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js');
  const { toBlobURL } = await import('https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/esm/index.js');
  const baseURL = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm';
  const ff = new FFmpeg();
  ff.on('progress', ({ratio}) => onLog && onLog({ratio}));
  await ff.load({
    coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
    wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm')
  });
  ffmpegInstance = ff;
  return ff;
}

$('#exportBtn').addEventListener('click', async ()=>{
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal">
      <h2>書き出し中</h2>
      <p id="exportMsg">エンジンを読み込んでいます…（初回はサイズが大きいため時間がかかります）</p>
      <progress id="exportProgress" value="0" max="1"></progress>
      <div class="row"><button class="btn danger sm" id="exportCancel">閉じる</button></div>
    </div>`;
  document.body.appendChild(bg);
  const msg = bg.querySelector('#exportMsg');
  const prog = bg.querySelector('#exportProgress');
  bg.querySelector('#exportCancel').onclick = ()=> bg.remove();

  try{
    const { fetchFile } = await import('https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/esm/index.js');
    const ff = await loadFFmpeg(({ratio})=>{ if(ratio>=0) prog.value = ratio; });

    const partNames = [];
    for(let i=0;i<clips.length;i++){
      const c = clips[i];
      msg.textContent = `クリップ ${i+1}/${clips.length} をトリム中…`;
      const inName = `in${i}.mp4`;
      const outName = `part${i}.mp4`;
      await ff.writeFile(inName, await fetchFile(c.file));
      await ff.exec([
        '-ss', String(c.inP), '-i', inName, '-t', String(c.outP - c.inP),
        '-c:v', 'libx264', '-preset', 'veryfast', '-crf', '20',
        '-c:a', 'aac', '-b:a', '160k', '-movflags', '+faststart', outName
      ]);
      partNames.push(outName);
      await ff.deleteFile(inName);
    }

    msg.textContent = '結合しています…';
    const listContent = partNames.map(n=>`file '${n}'`).join('\n');
    await ff.writeFile('list.txt', new TextEncoder().encode(listContent));
    await ff.exec(['-f','concat','-safe','0','-i','list.txt','-c','copy','output.mp4']);

    const data = await ff.readFile('output.mp4');
    const blob = new Blob([data.buffer], {type:'video/mp4'});
    const url = URL.createObjectURL(blob);

    bg.remove();
    showResultModal(url, blob);
  }catch(err){
    console.error(err);
    msg.textContent = 'エラーが発生しました: ' + err.message;
  }
});

function showResultModal(url, blob){
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal">
      <h2>書き出し完了</h2>
      <p>1本の動画として書き出しました。下のボタンから共有シートを開き「ビデオを保存」を選ぶとカメラロールに保存できます（端末によりダウンロード後にギャラリーへ反映される場合もあります）。</p>
      <div class="row">
        <button class="btn primary" id="shareBtn">📤 共有 / カメラロールに保存</button>
      </div>
      <div class="row">
        <a class="btn" href="${url}" download="output.mp4">⬇ ダウンロード</a>
        <button class="btn ghost sm" id="closeResult">閉じる</button>
      </div>
    </div>`;
  document.body.appendChild(bg);
  bg.querySelector('#closeResult').onclick = ()=>{ bg.remove(); };
  bg.querySelector('#shareBtn').onclick = async ()=>{
    const file = new File([blob], 'output.mp4', {type:'video/mp4'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file], title:'書き出し動画'}); }
      catch(e){ /* ユーザーがキャンセルした場合など */ }
    } else {
      setStatus('この端末は共有シートに対応していません。ダウンロードボタンをご利用ください。');
    }
  };
}

$('#helpBtn').addEventListener('click', ()=>{
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal">
      <h2>使い方</h2>
      <p>
      1. 「動画を選択」でカメラロールから複数動画をタップした順に選択します（その順番でつながります）。<br>
      2. タイムライン上のクリップ端をドラッグしてトリムできます。クリップ本体をドラッグすると並べ替えできます。<br>

      4. 「編集を保存」でFCPXML形式の編集データをブラウザに保存します（動画ファイル自体は保存されません）。<br>
      5. 「書き出し」を押すと1本の動画に結合し、共有シートからカメラロールに保存できます。
      </p>
      <div class="row"><button class="btn primary" id="closeHelp" style="width:100%;">閉じる</button></div>
    </div>`;
  document.body.appendChild(bg);
  bg.querySelector('#closeHelp').onclick = ()=> bg.remove();
});

render();
</script>
